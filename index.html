<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aakhil — Developer &amp; Photographer</title>
    <meta name="description" content="Personal space of Aakhil — developer, photographer, and writer. Code, snapshots, and thoughts on tech and beyond.">
    <meta name="author" content="Aakhil">
    <meta name="keywords" content="Aakhil, developer, software engineer, photography, blog, portfolio">
    <meta name="theme-color" content="#181c20">
    <link rel="canonical" href="https://aakhil.in/">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Aakhil — Developer &amp; Photographer">
    <meta property="og:description" content="Personal space of Aakhil — developer, photographer, and writer.">
    <meta property="og:url" content="https://aakhil.in/">
    <meta property="og:site_name" content="Aakhil">

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Aakhil — Developer &amp; Photographer">
    <meta name="twitter:description" content="Personal space of Aakhil — developer, photographer, and writer.">

    <!-- Inline SVG favicon: green terminal prompt on dark background -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23181c20'/%3E%3Ctext x='6' y='23' font-family='monospace' font-size='18' fill='%23c3e88d'%3E%26gt;_%3C/text%3E%3C/svg%3E">

    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="terminal" id="terminal">
        <div class="terminal-header">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
        </div>
        <div class="ascii-title-box">
<pre>
┌────────────────────┐
│   Hi, I'm Aakhil   │
└────────────────────┘
</pre>
        </div>
        <div id="welcome-block">
            <span class="prompt">aakhil@universe:~$</span> ./welcome_msg.sh
            <div style="margin-top:0.5em;">Hello Human, Welcome to my space</div>
        </div>
        <div style="margin-top:2em;" id="main-menu">
            <span class="prompt">aakhil@universe:~$</span>
            <span>
                <span class="folder-link" onclick="runTerminalAnimation('whoami')">whoami</span>  |
                <span class="folder-link" onclick="runTerminalAnimation('photography')">photography</span>  |
                <span class="folder-link" onclick="runTerminalAnimation('blogs')">blogs</span>  |
                <a class="folder-link" href="/games">games</a>
            </span>
        </div>
        <div id="output"></div>
    </div>
    <script>
        const output = document.getElementById('output');
        const mainMenu = document.getElementById('main-menu');
        const sections = {
            whoami: {
                command: true,
                content: `
                    <div class="output-section">
                        <h2>whoami</h2>
                        <div><span class="comment"># a quick intro</span></div>
                        <div>
                            <p>Hi, I'm Aakhil — a developer who loves building things,
                            breaking them, and figuring out how they work.<br>
                            When I'm away from the keyboard you'll find me behind a camera,
                            hopping cafés in the name of "research" (read: caffeine addiction),
                            or in the kitchen cooking up meals that are <em>almost</em> as good
                            as I claim they are.</p>
                            <p><span class="comment"># let's connect</span><br>
                            <a class="contact-link" href="https://www.linkedin.com/in/aakhil" target="_blank" rel="noopener">LinkedIn</a></p>
                        </div>
                        <div>
                            <span class="cd-link" onclick="runClear()">clear</span>
                        </div>
                    </div>
                `
            },
            photography: {
                prompt: 'aakhil@universe:~/photography$',
                content: `
                    <div class="output-section">
                        <h2>Photography</h2>
                        <div><span class="comment"># Snapshots, stories, and pixels</span></div>
                        <div>
                            <p>Welcome to my photography section!<br>
                            <span style="color:var(--accent)">[Coming soon]</span> My favorite shots and the stories behind them.</p>
                        </div>
                        <div>
                            <span class="cd-link" onclick="runCdBack()">cd ..</span>
                        </div>
                    </div>
                `
            },
            blogs: {
                prompt: 'aakhil@universe:~/blogs$',
                content: `
                    <div class="output-section">
                        <h2>Blogs</h2>
                        <div><span class="comment"># Thoughts, tutorials, and tech</span></div>
                        <div>
                            <p>Read my latest posts, guides, and experiences in tech and beyond.<br>
                            <span style="color:var(--accent)">[Coming soon]</span></p>
                        </div>
                        <div>
                            <span class="cd-link" onclick="runCdBack()">cd ..</span>
                        </div>
                    </div>
                `
            }
        };

        function typeText(element, text, callback, speed = 40) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        function runTerminalAnimation(section) {
            mainMenu.style.display = 'none';
            output.innerHTML = '';
            const cmdDiv = document.createElement('div');
            cmdDiv.innerHTML = `<span class="prompt">aakhil@universe:~$</span> `;
            output.appendChild(cmdDiv);

            if (sections[section].command) {
                // Command sections (e.g. whoami): just run the command, no cd/ls
                typeText(cmdDiv, section, () => {
                    setTimeout(() => {
                        output.innerHTML += sections[section].content;
                    }, 350);
                });
                return;
            }

            // Folder sections: cd into them, then ls
            typeText(cmdDiv, `cd ${section}`, () => {
                setTimeout(() => {
                    const lsDiv = document.createElement('div');
                    lsDiv.innerHTML = `<span class="prompt">${sections[section].prompt}</span> `;
                    output.appendChild(lsDiv);
                    typeText(lsDiv, 'ls', () => {
                        setTimeout(() => {
                            output.innerHTML += sections[section].content;
                        }, 350);
                    });
                }, 350);
            });
        }

        function runClear() {
            output.innerHTML = '';
            const cmdDiv = document.createElement('div');
            cmdDiv.innerHTML = `<span class="prompt">aakhil@universe:~$</span> `;
            output.appendChild(cmdDiv);
            typeText(cmdDiv, 'clear', () => {
                setTimeout(() => {
                    output.innerHTML = '';
                    mainMenu.style.display = '';
                }, 350);
            });
        }

        function runCdBack() {
            output.innerHTML = '';
            // Animate cd .. command
            const cmdDiv = document.createElement('div');
            cmdDiv.innerHTML = `<span class="prompt">aakhil@universe:~$</span> `;
            output.appendChild(cmdDiv);
            typeText(cmdDiv, 'cd ..', () => {
                setTimeout(() => {
                    output.innerHTML = '';
                    mainMenu.style.display = '';
                }, 350);
            });
        }
    </script>
</body>
</html>

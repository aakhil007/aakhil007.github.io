<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aakhil — Developer &amp; Photographer</title>
    <meta name="description" content="Personal space of Aakhil — developer, photographer, and writer. Code, snapshots, and thoughts on tech and beyond.">
    <meta name="author" content="Aakhil">
    <meta name="keywords" content="Aakhil, developer, software engineer, photography, blog, portfolio">
    <meta name="theme-color" content="#181c20">
    <link rel="canonical" href="https://aakhil.in/">

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Aakhil — Developer &amp; Photographer">
    <meta property="og:description" content="Personal space of Aakhil — developer, photographer, and writer.">
    <meta property="og:url" content="https://aakhil.in/">
    <meta property="og:site_name" content="Aakhil">

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Aakhil — Developer &amp; Photographer">
    <meta name="twitter:description" content="Personal space of Aakhil — developer, photographer, and writer.">

    <!-- Inline SVG favicon: green terminal prompt on dark background -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23181c20'/%3E%3Ctext x='6' y='23' font-family='monospace' font-size='18' fill='%23c3e88d'%3E%26gt;_%3C/text%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #181c20;
            --panel: #23272e;
            --text: #c3e88d;
            --comment: #5c6370;
            --accent: #82aaff;
            --folder: #ffd700;
            --shadow: 0 2px 12px rgba(0,0,0,0.12);
        }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Fira Mono', 'Consolas', 'Menlo', monospace;
            min-height: 100vh;
        }
        .terminal {
            background: var(--panel);
            margin: 2rem auto;
            max-width: 700px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            padding: 2rem 1.5rem 1.5rem 1.5rem;
            position: relative;
        }
        .terminal-header {
            display: flex;
            align-items: center;
            gap: 0.5em;
            margin-bottom: 1.5em;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }
        .prompt {
            color: var(--accent);
        }
        .cursor {
            display: inline-block;
            width: 10px;
            background: var(--accent);
            animation: blink 1s steps(1) infinite;
            height: 1.1em;
            vertical-align: middle;
            margin-left: 2px;
        }
        .ascii-title-box {
            background: #181c20;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 1em 0.5em;
            margin-bottom: 1.5em;
            text-align: center;
            font-family: 'Fira Mono', 'Consolas', 'Menlo', monospace;
            font-size: 1.1em;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            display: inline-block;
            width: 100%;
            color: var(--text);
        }
        .comment {
            color: var(--comment);
            font-style: italic;
            margin-bottom: 1.5em;
            display: block;
        }
        .folder-link {
            color: var(--folder);
            cursor: pointer;
            text-decoration: underline;
            font-weight: bold;
            margin: 0 0.5em;
            transition: color 0.2s;
        }
        .folder-link:hover {
            color: #fffbe7;
        }
        .cd-link {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
            margin-top: 2em;
            display: inline-block;
            transition: color 0.2s;
        }
        .cd-link:hover {
            color: #c3e88d;
        }
        .contact-link {
            color: var(--accent);
            text-decoration: underline;
            transition: color 0.2s;
        }
        .contact-link:hover {
            color: var(--folder);
        }
        .output-section {
            margin-top: 1.5em;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: none;}
        }
        /* ---- Games arcade ---- */
        .btn {
            font-family: inherit;
            background: #2c313a;
            color: var(--text);
            border: 1px solid #3a414d;
            border-radius: 6px;
            padding: 0.4em 0.9em;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn:hover { background: #353b45; border-color: var(--accent); }
        .btn.primary { border-color: var(--accent); color: var(--accent); }
        .btn.active { border-color: var(--folder); color: var(--folder); }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.8em;
            margin: 1em 0;
        }
        .game-tile {
            background: #2c313a;
            border: 1px solid #3a414d;
            border-radius: 8px;
            padding: 1em;
            cursor: pointer;
            text-align: center;
            transition: transform 0.15s, border-color 0.15s;
        }
        .game-tile:hover { transform: translateY(-3px); border-color: var(--accent); }
        .game-tile.soon { opacity: 0.5; cursor: default; }
        .game-tile.soon:hover { transform: none; border-color: #3a414d; }
        .game-tile .icon { font-size: 1.8em; display: block; margin-bottom: 0.2em; }
        .game-tile .name { color: var(--folder); font-weight: bold; }
        .game-tile .meta { color: var(--comment); font-size: 0.8em; display: block; margin-top: 0.3em; }
        .name-form { display: flex; gap: 0.5em; flex-wrap: wrap; margin: 0.6em 0; }
        .name-form input {
            font-family: inherit;
            background: #181c20;
            color: var(--text);
            border: 1px solid #3a414d;
            border-radius: 6px;
            padding: 0.4em 0.6em;
        }
        /* ---- Sudoku ---- */
        .sudoku-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.8em;
            margin: 0.8em 0;
        }
        .sudoku-bar .timer { color: var(--accent); }
        .difficulty-row { display: flex; gap: 0.5em; flex-wrap: wrap; margin: 0.6em 0; }
        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            box-sizing: border-box;
            width: 100%;
            max-width: 225px;            /* 3 boxes × 75px = 225px total */
            margin: 0.8em 0;
            background: #fff;
            border: 2px solid #1a1a1a;
        }
        .sudoku-cell {
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
            min-width: 0;
            border: none;
            border-right: 1px solid #c8c8c8;
            border-bottom: 1px solid #c8c8c8;
            background: #fff;
            color: #1d4ed8;               /* your "pencil" entries */
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 0.95em;
            font-weight: 600;
            line-height: 1;
            text-align: center;
            padding: 0;
            border-radius: 0;
            -moz-appearance: textfield;
        }
        .sudoku-cell:focus { outline: none; background: #fff6c2; }
        .sudoku-cell.given { color: #111; font-weight: 700; }
        .sudoku-cell.conflict { color: #c0392b; background: #ffdede; }
        /* trim inner edges so they don't double up with the outer frame */
        .sudoku-cell:nth-child(9n) { border-right: none; }
        .sudoku-cell:nth-child(n+73) { border-bottom: none; }
        /* thick 3x3 separators for the printed-grid look */
        .sudoku-cell.box-edge-right { border-right: 2px solid #1a1a1a; }
        .sudoku-cell.box-edge-bottom { border-bottom: 2px solid #1a1a1a; }
        .num-pad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.3em; max-width: 255px; margin: 0.6em 0; }
        .num-pad .btn { padding: 0.5em 0; }
        .win-banner { color: var(--folder); font-weight: bold; margin: 0.6em 0; }
        .stats-line { color: var(--comment); margin: 0.4em 0; }
        @media (max-width: 600px) {
            .terminal {
                padding: 1rem 0.5rem 1rem 0.5rem;
            }
            .ascii-title-box {
                font-size: 0.85em;
                padding: 0.5em 0.2em;
            }
            .sudoku-board { max-width: 225px; }
            .num-pad { max-width: 255px; }
        }
    </style>
</head>
<body>
    <div class="terminal" id="terminal">
        <div class="terminal-header">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
        </div>
        <div class="ascii-title-box">
<pre>
┌────────────────────┐
│   Hi, I'm Aakhil   │
└────────────────────┘
</pre>
        </div>
        <div id="welcome-block">
            <span class="prompt">aakhil@universe:~$</span> ./welcome_msg.sh
            <div style="margin-top:0.5em;">Hello Human, Welcome to my space</div>
        </div>
        <div style="margin-top:2em;" id="main-menu">
            <span class="prompt">aakhil@universe:~$</span> 
            <span>
                <span class="folder-link" onclick="runTerminalAnimation('whoami')">whoami</span>  |
                <span class="folder-link" onclick="runTerminalAnimation('photography')">photography</span>  |
                <span class="folder-link" onclick="runTerminalAnimation('blogs')">blogs</span>  |
                <span class="folder-link" onclick="runTerminalAnimation('games')">games</span>
            </span>
        </div>
        <div id="output"></div>
    </div>
    <script>
        const output = document.getElementById('output');
        const mainMenu = document.getElementById('main-menu');
        const sections = {
            whoami: {
                command: true,
                content: `
                    <div class="output-section">
                        <h2>whoami</h2>
                        <div><span class="comment"># a quick intro</span></div>
                        <div>
                            <p>Hi, I'm Aakhil — a developer who loves building things,
                            breaking them, and figuring out how they work.<br>
                            When I'm away from the keyboard you'll find me behind a camera,
                            hopping cafés in the name of "research" (read: caffeine addiction),
                            or in the kitchen cooking up meals that are <em>almost</em> as good
                            as I claim they are.</p>
                            <p><span class="comment"># let's connect</span><br>
                            <a class="contact-link" href="https://www.linkedin.com/in/aakhil" target="_blank" rel="noopener">LinkedIn</a></p>
                        </div>
                        <div>
                            <span class="cd-link" onclick="runClear()">clear</span>
                        </div>
                    </div>
                `
            },
            photography: {
                prompt: 'aakhil@universe:~/photography$',
                content: `
                    <div class="output-section">
                        <h2>Photography</h2>
                        <div><span class="comment"># Snapshots, stories, and pixels</span></div>
                        <div>
                            <p>Welcome to my photography section!<br>
                            <span style="color:var(--accent)">[Coming soon]</span> My favorite shots and the stories behind them.</p>
                        </div>
                        <div>
                            <span class="cd-link" onclick="runCdBack()">cd ..</span>
                        </div>
                    </div>
                `
            },
            blogs: {
                prompt: 'aakhil@universe:~/blogs$',
                content: `
                    <div class="output-section">
                        <h2>Blogs</h2>
                        <div><span class="comment"># Thoughts, tutorials, and tech</span></div>
                        <div>
                            <p>Read my latest posts, guides, and experiences in tech and beyond.<br>
                            <span style="color:var(--accent)">[Coming soon]</span></p>
                        </div>
                        <div>
                            <span class="cd-link" onclick="runCdBack()">cd ..</span>
                        </div>
                    </div>
                `
            },
            games: {
                prompt: 'aakhil@universe:~/games$',
                render: (container) => Games.showArcade(container)
            }
        };

        function typeText(element, text, callback, speed = 40) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    callback();
                }
            }
            type();
        }

        function runTerminalAnimation(section) {
            mainMenu.style.display = 'none';
            output.innerHTML = '';
            const cmdDiv = document.createElement('div');
            cmdDiv.innerHTML = `<span class="prompt">aakhil@universe:~$</span> `;
            output.appendChild(cmdDiv);

            if (sections[section].command) {
                // Command sections (e.g. whoami): just run the command, no cd/ls
                typeText(cmdDiv, section, () => {
                    setTimeout(() => {
                        output.innerHTML += sections[section].content;
                    }, 350);
                });
                return;
            }

            // Folder sections: cd into them, then ls
            typeText(cmdDiv, `cd ${section}`, () => {
                setTimeout(() => {
                    const lsDiv = document.createElement('div');
                    lsDiv.innerHTML = `<span class="prompt">${sections[section].prompt}</span> `;
                    output.appendChild(lsDiv);
                    typeText(lsDiv, 'ls', () => {
                        setTimeout(() => {
                            if (sections[section].render) {
                                const wrap = document.createElement('div');
                                wrap.className = 'output-section';
                                output.appendChild(wrap);
                                sections[section].render(wrap);
                            } else {
                                output.innerHTML += sections[section].content;
                            }
                        }, 350);
                    });
                }, 350);
            });
        }

        function runClear() {
            output.innerHTML = '';
            const cmdDiv = document.createElement('div');
            cmdDiv.innerHTML = `<span class="prompt">aakhil@universe:~$</span> `;
            output.appendChild(cmdDiv);
            typeText(cmdDiv, 'clear', () => {
                setTimeout(() => {
                    output.innerHTML = '';
                    mainMenu.style.display = '';
                }, 350);
            });
        }

        function runCdBack() {
            output.innerHTML = '';
            // Animate cd .. command
            const cmdDiv = document.createElement('div');
            cmdDiv.innerHTML = `<span class="prompt">aakhil@universe:~$</span> `;
            output.appendChild(cmdDiv);
            typeText(cmdDiv, 'cd ..', () => {
                setTimeout(() => {
                    output.innerHTML = '';
                    mainMenu.style.display = '';
                }, 350);
            });
        }

        /* =========================================================
           Games arcade — pure client-side, state saved in localStorage
        ========================================================= */
        const Store = {
            get(key, fallback) {
                try {
                    const raw = localStorage.getItem(key);
                    return raw === null ? fallback : JSON.parse(raw);
                } catch (e) { return fallback; }
            },
            set(key, value) {
                try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
            },
            remove(key) {
                try { localStorage.removeItem(key); } catch (e) {}
            }
        };

        const KEYS = {
            user: 'aakhil.games.user',
            pref: 'aakhil.sudoku.difficulty',
            stats: 'aakhil.sudoku.stats',
            save: 'aakhil.sudoku.save'
        };

        const DIFFICULTIES = { easy: 45, medium: 36, hard: 30 }; // number of given clues

        const Games = {
            root: null,

            showArcade(container) {
                this.root = container;
                const name = Store.get(KEYS.user, null);
                if (!name) { this.renderNamePrompt(); return; }
                this.renderArcade(name);
            },

            renderNamePrompt() {
                this.root.innerHTML = '';
                const h = document.createElement('h2');
                h.textContent = 'games';
                const c = document.createElement('div');
                c.className = 'comment';
                c.textContent = "# first time here — what should I call you?";
                const form = document.createElement('form');
                form.className = 'name-form';
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 24;
                input.placeholder = 'your name';
                input.setAttribute('aria-label', 'your name');
                const btn = document.createElement('button');
                btn.type = 'submit';
                btn.className = 'btn primary';
                btn.textContent = 'save';
                form.append(input, btn);
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const val = input.value.trim() || 'Player';
                    Store.set(KEYS.user, val);
                    this.renderArcade(val);
                });
                this.root.append(h, c, form);
                input.focus();
            },

            renderArcade(name) {
                this.root.innerHTML = '';
                const h = document.createElement('h2');
                h.textContent = 'games';
                const greet = document.createElement('div');
                greet.innerHTML = `<span class="comment"># welcome back, </span><span style="color:var(--folder)">${escapeHtml(name)}</span> ` +
                    `<span class="comment">(</span><span class="cd-link" style="margin:0;font-size:0.85em;">not you?</span><span class="comment">)</span>`;
                greet.querySelector('.cd-link').onclick = () => {
                    Store.remove(KEYS.user);
                    this.renderNamePrompt();
                };

                const grid = document.createElement('div');
                grid.className = 'games-grid';

                const stats = Store.get(KEYS.stats, { played: 0, won: 0, best: {} });
                const sudokuTile = document.createElement('div');
                sudokuTile.className = 'game-tile';
                sudokuTile.innerHTML = `<span class="icon">🔢</span><span class="name">Sudoku</span>` +
                    `<span class="meta">${stats.won || 0} solved</span>`;
                sudokuTile.onclick = () => this.launchSudoku();

                const soon = document.createElement('div');
                soon.className = 'game-tile soon';
                soon.innerHTML = `<span class="icon">🕹️</span><span class="name">More</span><span class="meta">coming soon</span>`;

                grid.append(sudokuTile, soon);

                const statsLine = document.createElement('div');
                statsLine.className = 'stats-line';
                const best = stats.best || {};
                const bestParts = ['easy', 'medium', 'hard']
                    .filter((d) => best[d] != null)
                    .map((d) => `${d} ${formatTime(best[d])}`);
                statsLine.textContent = '# best times: ' + (bestParts.length ? bestParts.join('  ·  ') : 'none yet');

                const back = document.createElement('div');
                const cd = document.createElement('span');
                cd.className = 'cd-link';
                cd.textContent = 'cd ..';
                cd.onclick = () => runCdBack();
                back.appendChild(cd);

                this.root.append(h, greet, grid, statsLine, back);
            },

            launchSudoku() {
                Sudoku.mount(this.root, () => this.showArcade(this.root));
            }
        };

        /* ---------------- Sudoku engine ---------------- */
        const Sudoku = {
            root: null,
            onExit: null,
            state: null,
            timer: null,

            mount(container, onExit) {
                this.root = container;
                this.onExit = onExit;
                const saved = Store.get(KEYS.save, null);
                if (saved) { this.renderResumePrompt(saved); }
                else { this.renderSetup(); }
            },

            renderResumePrompt(saved) {
                this.stopTimer();
                this.root.innerHTML = '';
                const h = document.createElement('h2');
                h.textContent = 'Sudoku';
                const note = document.createElement('div');
                note.className = 'comment';
                note.textContent = `# you have a ${saved.difficulty} game in progress (${formatTime(saved.elapsed)})`;
                const row = document.createElement('div');
                row.className = 'difficulty-row';
                const resume = document.createElement('button');
                resume.className = 'btn primary';
                resume.textContent = 'Resume';
                resume.onclick = () => this.startFromSave(saved);
                const fresh = document.createElement('button');
                fresh.className = 'btn';
                fresh.textContent = 'New game';
                fresh.onclick = () => { Store.remove(KEYS.save); this.renderSetup(); };
                row.append(resume, fresh);
                this.root.append(h, note, row, this.backToArcade());
            },

            renderSetup() {
                this.stopTimer();
                this.root.innerHTML = '';
                const h = document.createElement('h2');
                h.textContent = 'Sudoku';
                const note = document.createElement('div');
                note.className = 'comment';
                note.textContent = '# pick a difficulty';
                const row = document.createElement('div');
                row.className = 'difficulty-row';
                const pref = Store.get(KEYS.pref, 'easy');
                Object.keys(DIFFICULTIES).forEach((diff) => {
                    const b = document.createElement('button');
                    b.className = 'btn' + (diff === pref ? ' active' : '');
                    b.textContent = diff;
                    b.onclick = () => { Store.set(KEYS.pref, diff); this.newGame(diff); };
                    row.appendChild(b);
                });
                this.root.append(h, note, row, this.backToArcade());
            },

            backToArcade() {
                const wrap = document.createElement('div');
                const link = document.createElement('span');
                link.className = 'cd-link';
                link.textContent = '← back to games';
                link.onclick = () => { this.stopTimer(); this.onExit(); };
                wrap.appendChild(link);
                return wrap;
            },

            newGame(difficulty) {
                const solution = generateSolved();
                const puzzle = makePuzzle(solution, DIFFICULTIES[difficulty]);
                this.state = {
                    difficulty,
                    solution,
                    puzzle,
                    current: puzzle.map((r) => r.slice()),
                    elapsed: 0,
                    startTs: Date.now(),
                    solved: false
                };
                this.save();
                this.renderGame();
                this.startTimer();
            },

            startFromSave(saved) {
                this.state = {
                    difficulty: saved.difficulty,
                    solution: saved.solution,
                    puzzle: saved.puzzle,
                    current: saved.current,
                    elapsed: saved.elapsed,
                    startTs: Date.now(),
                    solved: false
                };
                this.renderGame();
                this.startTimer();
            },

            renderGame() {
                this.stopTimer();
                this.root.innerHTML = '';
                const s = this.state;

                const h = document.createElement('h2');
                h.textContent = 'Sudoku';

                const bar = document.createElement('div');
                bar.className = 'sudoku-bar';
                bar.innerHTML = `<span class="comment">${s.difficulty}</span>` +
                    `<span class="timer" id="sudoku-timer">${formatTime(s.elapsed)}</span>`;
                const newBtn = document.createElement('button');
                newBtn.className = 'btn';
                newBtn.textContent = 'New';
                newBtn.onclick = () => this.renderSetup();
                const checkBtn = document.createElement('button');
                checkBtn.className = 'btn';
                checkBtn.textContent = 'Check';
                checkBtn.onclick = () => this.highlightConflicts(true);
                bar.append(newBtn, checkBtn);

                const board = document.createElement('div');
                board.className = 'sudoku-board';
                this.cells = [];
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        const cell = document.createElement('input');
                        cell.type = 'text';
                        cell.inputMode = 'numeric';
                        cell.maxLength = 1;
                        cell.className = 'sudoku-cell';
                        if ((c + 1) % 3 === 0 && c !== 8) cell.classList.add('box-edge-right');
                        if ((r + 1) % 3 === 0 && r !== 8) cell.classList.add('box-edge-bottom');
                        cell.dataset.r = r;
                        cell.dataset.c = c;
                        const given = s.puzzle[r][c] !== 0;
                        if (given) {
                            cell.value = s.puzzle[r][c];
                            cell.readOnly = true;
                            cell.classList.add('given');
                        } else if (s.current[r][c] !== 0) {
                            cell.value = s.current[r][c];
                        }
                        cell.addEventListener('input', (e) => this.onInput(e, r, c));
                        cell.addEventListener('keydown', (e) => this.onKey(e, r, c));
                        board.appendChild(cell);
                        this.cells.push(cell);
                    }
                }

                const pad = document.createElement('div');
                pad.className = 'num-pad';
                for (let n = 1; n <= 9; n++) {
                    const b = document.createElement('button');
                    b.className = 'btn';
                    b.textContent = n;
                    b.onclick = () => this.padInput(String(n));
                    pad.appendChild(b);
                }
                const erase = document.createElement('button');
                erase.className = 'btn';
                erase.textContent = '⌫';
                erase.onclick = () => this.padInput('');
                pad.appendChild(erase);

                const banner = document.createElement('div');
                banner.id = 'sudoku-banner';

                this.root.append(h, bar, board, pad, banner, this.backToArcade());
                this.highlightConflicts(false);
            },

            onInput(e, r, c) {
                const v = e.target.value.replace(/[^1-9]/g, '');
                e.target.value = v;
                this.state.current[r][c] = v === '' ? 0 : parseInt(v, 10);
                this.save();
                this.highlightConflicts(false);
                this.checkWin();
            },

            onKey(e, r, c) {
                const moves = { ArrowUp: [-1, 0], ArrowDown: [1, 0], ArrowLeft: [0, -1], ArrowRight: [0, 1] };
                if (moves[e.key]) {
                    e.preventDefault();
                    const nr = (r + moves[e.key][0] + 9) % 9;
                    const nc = (c + moves[e.key][1] + 9) % 9;
                    const next = this.cells[nr * 9 + nc];
                    if (next) next.focus();
                }
            },

            padInput(val) {
                const active = document.activeElement;
                if (!active || !active.classList.contains('sudoku-cell') || active.readOnly) return;
                active.value = val;
                active.dispatchEvent(new Event('input'));
            },

            highlightConflicts(showWrong) {
                const s = this.state;
                this.cells.forEach((cell) => cell.classList.remove('conflict'));
                const mark = (r, c) => this.cells[r * 9 + c].classList.add('conflict');
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        const v = s.current[r][c];
                        if (v === 0) continue;
                        // duplicate in row/col/box
                        for (let i = 0; i < 9; i++) {
                            if (i !== c && s.current[r][i] === v) { mark(r, c); }
                            if (i !== r && s.current[i][c] === v) { mark(r, c); }
                        }
                        const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
                        for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) {
                            const rr = br + i, cc = bc + j;
                            if ((rr !== r || cc !== c) && s.current[rr][cc] === v) { mark(r, c); }
                        }
                        if (showWrong && v !== s.solution[r][c]) { mark(r, c); }
                    }
                }
            },

            checkWin() {
                const s = this.state;
                for (let r = 0; r < 9; r++) {
                    for (let c = 0; c < 9; c++) {
                        if (s.current[r][c] !== s.solution[r][c]) return;
                    }
                }
                // Won!
                s.solved = true;
                this.stopTimer();
                Store.remove(KEYS.save);
                const stats = Store.get(KEYS.stats, { played: 0, won: 0, best: {} });
                stats.played = (stats.played || 0) + 1;
                stats.won = (stats.won || 0) + 1;
                stats.best = stats.best || {};
                const prevBest = stats.best[s.difficulty];
                let isRecord = false;
                if (prevBest == null || s.elapsed < prevBest) { stats.best[s.difficulty] = s.elapsed; isRecord = true; }
                Store.set(KEYS.stats, stats);

                const banner = document.getElementById('sudoku-banner');
                if (banner) {
                    banner.className = 'win-banner';
                    const name = Store.get(KEYS.user, 'Player');
                    banner.innerHTML = `✔ Solved in ${formatTime(s.elapsed)}, ${escapeHtml(name)}! ` +
                        (isRecord ? `<span style="color:var(--accent)">New best for ${s.difficulty}!</span>` : `<span class="comment">best: ${formatTime(stats.best[s.difficulty])}</span>`);
                }
                this.cells.forEach((cell) => { cell.readOnly = true; });
            },

            startTimer() {
                this.stopTimer();
                this.state.startTs = Date.now() - this.state.elapsed * 1000;
                this.timer = setInterval(() => {
                    if (!this.state || this.state.solved) return;
                    this.state.elapsed = Math.floor((Date.now() - this.state.startTs) / 1000);
                    const t = document.getElementById('sudoku-timer');
                    if (t) t.textContent = formatTime(this.state.elapsed);
                    this.save();
                }, 1000);
            },

            stopTimer() {
                if (this.timer) { clearInterval(this.timer); this.timer = null; }
            },

            save() {
                if (!this.state || this.state.solved) return;
                Store.set(KEYS.save, {
                    difficulty: this.state.difficulty,
                    solution: this.state.solution,
                    puzzle: this.state.puzzle,
                    current: this.state.current,
                    elapsed: this.state.elapsed
                });
            }
        };

        /* ---------------- Sudoku helpers ---------------- */
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function isSafe(board, r, c, n) {
            for (let i = 0; i < 9; i++) {
                if (board[r][i] === n || board[i][c] === n) return false;
            }
            const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
            for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) {
                if (board[br + i][bc + j] === n) return false;
            }
            return true;
        }

        function fillBoard(board) {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] === 0) {
                        for (const n of shuffle([1, 2, 3, 4, 5, 6, 7, 8, 9])) {
                            if (isSafe(board, r, c, n)) {
                                board[r][c] = n;
                                if (fillBoard(board)) return true;
                                board[r][c] = 0;
                            }
                        }
                        return false;
                    }
                }
            }
            return true;
        }

        function generateSolved() {
            const board = Array.from({ length: 9 }, () => Array(9).fill(0));
            fillBoard(board);
            return board;
        }

        function countSolutions(board, limit) {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] === 0) {
                        let count = 0;
                        for (let n = 1; n <= 9; n++) {
                            if (isSafe(board, r, c, n)) {
                                board[r][c] = n;
                                count += countSolutions(board, limit);
                                board[r][c] = 0;
                                if (count >= limit) return count;
                            }
                        }
                        return count;
                    }
                }
            }
            return 1;
        }

        function makePuzzle(solution, clues) {
            const puzzle = solution.map((r) => r.slice());
            const cells = shuffle([...Array(81).keys()]);
            let filled = 81;
            for (const idx of cells) {
                if (filled <= clues) break;
                const r = Math.floor(idx / 9), c = idx % 9;
                if (puzzle[r][c] === 0) continue;
                const backup = puzzle[r][c];
                puzzle[r][c] = 0;
                const copy = puzzle.map((row) => row.slice());
                if (countSolutions(copy, 2) !== 1) {
                    puzzle[r][c] = backup; // removing broke uniqueness — keep it
                } else {
                    filled--;
                }
            }
            return puzzle;
        }

        function formatTime(totalSeconds) {
            const s = Math.max(0, totalSeconds | 0);
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, (ch) => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[ch]));
        }
    </script>
</body>
